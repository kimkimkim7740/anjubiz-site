<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anjubiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05080c;
    overflow: hidden;
    width: 100vw; height: 100vh;
  }
  #container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }
  #container canvas {
    display: block;
  }
</style>
</head>
<body>
<div id="container"></div>
<script type="module">
import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

const canvas = document.createElement('canvas');
document.getElementById('container').appendChild(canvas);

const spline = new Application(canvas);
spline
  .load('https://my.spline.design/nexbotrobotcharacterconcept-s2vrr5vfpOB2SvSPmvw4eySw/')
  .then(() => {
    console.log('Spline loaded');
  })
  .catch(err => {
    console.error('Spline error:', err);
    document.getElementById('container').innerHTML = '<p style="color:white;padding:2rem;">Failed to load: ' + err.message + '</p>';
  });
</script>
</body>
</html>
